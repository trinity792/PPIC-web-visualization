[tool.pytest.ini_options]
testpaths = ["scripts/unit_tests"]
pythonpath = ["."]
[tool.ruff]
target-version = "py312"    # your Python version, so rules match your syntax
line-length = 250           # max line width before ruff complains

[tool.ruff.lint]
select = ["E", "F", "I"]   # which rule families to enable